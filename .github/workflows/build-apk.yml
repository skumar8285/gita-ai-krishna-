name: Build Gita AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: stable
      - name: Create local.properties
        run: |
          echo "flutter.sdk=$(flutter --version 2>/dev/null | head -1 || echo /opt/hostedtoolcache/flutter/3.19.6-stable/x64)" > gita_flutter_app/gita_flutter/android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> gita_flutter_app/gita_flutter/android/local.properties
      - name: Get Flutter dependencies
        working-directory: gita_flutter_app/gita_flutter
        run: flutter pub get
      - name: Build APK
        working-directory: gita_flutter_app/gita_flutter
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gita-AI-Krishna-APK
          path: gita_flutter_app/gita_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
